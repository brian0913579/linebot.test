<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>停車場即時監控</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0f0f0f;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      header {
        width: 100%;
        padding: 14px 20px;
        background: #1a1a1a;
        border-bottom: 2px solid #ff0000;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header span { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
      .live-badge {
        background: #ff0000;
        color: white;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 3px;
        letter-spacing: 1px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .player-wrapper {
        width: 100%;
        max-width: 900px;
        padding: 16px;
        margin-top: 8px;
      }
      .embed-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(255,0,0,0.15);
      }
      .embed-container iframe {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        border: none;
        border-radius: 10px;
      }
      footer {
        margin-top: auto;
        padding: 16px;
        font-size: 0.75rem;
        color: #666;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <span>🎥 停車場即時監控</span>
      <span class="live-badge">LIVE</span>
    </header>

    <div class="player-wrapper">
      <div class="embed-container">
        <iframe
          src="{{ youtube_url }}"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <footer>此頁面僅供授權用戶查看 &bull; 請勿分享連結</footer>
  </body>
</html>
